[general]
framerate = 60
dynamic_colors = true
corner_radius = 0.0
disable_audio = false

[general.background_color]
hex = "#000000"
alpha = 0.0

[display]
position = "Fill"
anchor_top = true
anchor_bottom = true
anchor_left = true
anchor_right = true
width = 0
height = 0
margin_top = 0
margin_bottom = 0
margin_left = 0
margin_right = 0
layer = "Bottom"
opacity = 1.0
scale_with_resolution = false

[audio]
bar_count = 76
bar_width = 6.0
bar_spacing = 2.0
gap = 0.1
bar_alpha = 0.85
height_scale = 1.0
smoothing = 0.8
max_bar_height = 220.0
min_bar_height = 0.0
bar_shape = "Rectangle"

[audio.bar_color]
hex = "#89dceb"
alpha = 1.0

[colors]
use_gradient = false
gradient_direction = "BottomToTop"
palette = [[0.58, 0.89, 0.84, 1.0], [0.96, 0.76, 0.90, 1.0]]

[parallax]
enabled = false
mode = "Hybrid"
enable_3d_depth = false
layers = []

[xray]
images_dir = ""

[wallpaper]
auto_detect_wallpaper = true
sync_interval_seconds = 10

[xray_mask]
intensity = 0.8
gamma = 1.2
opacity = 1.0
blend_mode = "Normal"
use_background = false

[performance]
vsync = true
multi_threaded_decode = true

[advanced]
verbose_logging = false
frame_rate_limit = 60
layer_cache_size = 5
