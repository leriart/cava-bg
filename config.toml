# Configuración para cava-bg
# Alpha es un float de 0.0 a 1.0

[general]
framerate = 30
background_color = { hex = "#000000", alpha = 0.0 }
autosens = true
sensitivity = 100
# preferred_output = "eDP-1"
auto_detect_wallpaper_changes = true
wallpaper_check_interval = 5
auto_colors = true

[bars]
amount = 76
gap = 0.1

[colors]
gradient_color_1 = '#94e2d5'
gradient_color_2 = '#89dceb'
gradient_color_3 = '#74c7ec'
gradient_color_4 = '#89b4fa'
gradient_color_5 = '#cba6f7'
gradient_color_6 = '#f5c2e7'
gradient_color_7 = '#eba0ac'
gradient_color_8 = '#f38ba8'

[smoothing]
monstercat = 2
waves = 0
noise_reduction = 0.98