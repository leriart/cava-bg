name: CI/CD Release Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    # Only proceed to release if the push was directly to main
    # and if a tag pattern like v* exists, otherwise, just build.
    if: github.event_name == 'push' && contains(github.ref, 'refs/heads/main')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed to access full history for tagging

      - name: Install Rust Toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Build Project
        run: cargo build --release
        
      # --- Release Logic ---
      # This block checks if the current reference (branch or tag) matches a semantic version pattern.
      # It will only proceed to release if a valid tag was pushed.
      - name: Check for Tag
        id: tag_check
        run: |
          if [[ "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "TAG_FOUND=true" >> $GITHUB_OUTPUT
            echo "TAG_NAME=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "TAG_FOUND=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Create GitHub Release
        if: steps.tag_check.outputs.TAG_FOUND == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Release ${{ env.TAG_NAME }}
          body: |
            Automated release built on commit ${{ github.sha }}.
            This release corresponds to tag ${{ env.TAG_NAME }}.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          
      - name: Upload Artifact
        if: success() && steps.tag_check.outputs.TAG_FOUND == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.TAG_NAME }}-release
          path: target/release/my_app # <<< !!! IMPORTANT: Change 'my_app' to your actual executable name here !!!
