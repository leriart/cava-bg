# Catppuccin Mocha Theme
# Full gradient with Catppuccin Mocha colors

[general]
framerate = 60
background_color = { hex = "#1e1e2e", alpha = 0.7 }
preferred_output = ""  # Auto-detect

[bars]
amount = 64
gap = 0.15

[colors]
# Catppuccin Mocha gradient
rosewater = '#f5e0dc'
flamingo = '#f2cdcd'
pink = '#f5c2e7'
mauve = '#cba6f7'
red = '#f38ba8'
maroon = '#eba0ac'
peach = '#fab387'
yellow = '#f9e2af'
green = '#a6e3a1'
teal = '#94e2d5'
sky = '#89dceb'
sapphire = '#74c7ec'
blue = '#89b4fa'
lavender = '#b4befe'

[smoothing]
noise_reduction = 0.8
monstercat = 0
waves = 0