[package]
name = "cava-bg"
version = "0.1.0"
edition = "2021"
description = "Native CAVA audio visualizer for Hyprland wallpapers with adaptive color detection"
license = "MIT"
authors = ["leriart <>"]
repository = "https://github.com/leriart/cava-bg"
keywords = ["audio", "visualizer", "hyprland", "wayland", "cava"]
categories = ["multimedia::audio", "gui"]
readme = "README.md"
homepage = "https://github.com/leriart/cava-bg"
documentation = "https://github.com/leriart/cava-bg#readme"

[dependencies]
wayland-client = "0.32"
wayland-egl = "0.32"
smithay-client-toolkit = "0.20"
calloop = "0.14"
khronos-egl = "6.0"
gl = "0.14"
toml = "0.8"
anyhow = "1.0"
thiserror = "1.0"
log = "0.4"
env_logger = "0.11"
clap = { version = "4.0", features = ["derive"] }
dirs = "5.0"
serde = { version = "1.0", features = ["derive"] }
image = "0.24"
palette = "0.7"
walkdir = "2.5"

[build-dependencies]
gl_generator = "0.14"