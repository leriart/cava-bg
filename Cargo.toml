[package]
name = "cava-bg"
version = "0.1.0"
edition = "2021"
description = "Native CAVA audio visualizer for Hyprland wallpapers with adaptive color detection"
license = "MIT"
authors = ["leriart <>"]
repository = "https://github.com/leriart/cava-bg"
keywords = ["audio", "visualizer", "hyprland", "wayland", "cava"]
categories = ["multimedia::audio", "gui"]
readme = "README.md"
homepage = "https://github.com/leriart/cava-bg"
documentation = "https://github.com/leriart/cava-bg#readme"

[dependencies]
anyhow = "1.0"
log = "0.4"
env_logger = "0.10"
ctrlc = "3.4"
crossbeam-channel = "0.5"
gl = "0.14.0"
khronos-egl = { version = "6.0.0", features = ["static", "1_0", "1_1", "1_2", "1_3", "1_4", "1_5"] }
wayland-client = "0.31.2"
wayland-egl = "0.32.0"
wayland-protocols = { version = "0.31.2", features = ["client", "unstable"] }
toml = "0.8"
clap = { version = "4.0", features = ["derive"] }
dirs = "5.0"
serde = { version = "1.0", features = ["derive"] }
image = "0.24"
walkdir = "2.5"

[build-dependencies]
gl_generator = "0.14"

[[bin]]
name = "cava-bg"
path = "src/main.rs"