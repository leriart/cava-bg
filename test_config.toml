[general]
framerate = 60
background_color = { hex = "#000000", alpha = 0.0 }
auto_colors = false
auto_detect_wallpaper_changes = true
wallpaper_check_interval = 5

[bars]
amount = 76
gap = 0.1

[colors]
# Manual colors (will be used since auto_colors = false)
gradient_color_1 = "#FF0000"  # Red
gradient_color_2 = "#00FF00"  # Green
gradient_color_3 = "#0000FF"  # Blue
gradient_color_4 = "#FFFF00"  # Yellow
gradient_color_5 = "#FF00FF"  # Magenta
gradient_color_6 = "#00FFFF"  # Cyan
gradient_color_7 = "#FF8800"  # Orange
gradient_color_8 = "#8800FF"  # Purple

[smoothing]
monstercat = 0
waves = 0
noise_reduction = 0.77